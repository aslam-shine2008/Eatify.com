<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Mandhi Palace aranthangi</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    background: #f7f7f7;
    align-items: flex-start;
    overflow-x: hidden; 
    display: flex;
    justify-content: center;
}
@media(max-width:768px){
    body {
        align-items: center !important; 
        min-height: 100vh;
    }
    .menu-image{
        max-width: 100% !important;
        width: 100% !important;
    }
    .menu-image img {
        width: 100% !important;
        height: auto !important;
        object-fit: contain !important;
        transform: scale(1) !important;
    }
}
</style>
</head>

<body>
<div class="menu-image">                              
    <img src="../images/menu/mandhipalace-menu.png" alt="Mandhi palace Menu">
</div>
</body>
</html>
